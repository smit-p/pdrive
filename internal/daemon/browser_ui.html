<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>pdrive</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💾</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f8f9fa;--bg3:#f1f3f5;--fg:#111827;--fg2:#6b7280;--fg3:#9ca3af;
  --border:#e5e7eb;--accent:#2563eb;--accent-hover:#1d4ed8;--accent-bg:#eff6ff;
  --danger:#dc2626;--danger-bg:#fef2f2;--success:#16a34a;--success-bg:#f0fdf4;
  --warning:#d97706;--warning-bg:#fffbeb;
  --hover:#f9fafb;--selected:#eff6ff;
  --shadow:0 1px 3px rgba(0,0,0,.08);--shadow-lg:0 8px 24px rgba(0,0,0,.12);
  --radius:8px;--radius-sm:6px;
  --sidebar-w:220px;--topbar-h:52px;--panel-w:380px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--fg:#f1f5f9;--fg2:#94a3b8;--fg3:#64748b;
  --border:#334155;--accent:#3b82f6;--accent-hover:#60a5fa;--accent-bg:#1e3a5f;
  --danger:#ef4444;--danger-bg:#451a1a;--success:#22c55e;--success-bg:#14532d;
  --warning:#f59e0b;--warning-bg:#451a03;
  --hover:#1e293b;--selected:#1e3a5f;
  --shadow:0 1px 3px rgba(0,0,0,.3);--shadow-lg:0 8px 24px rgba(0,0,0,.5);
}}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,sans-serif;background:var(--bg);color:var(--fg);font-size:13px;line-height:1.5}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font:inherit;color:inherit;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px}
input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-bg)}
::selection{background:var(--accent-bg);color:var(--accent)}

/* Layout */
.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;grid-template-rows:var(--topbar-h) 1fr;height:100vh;overflow:hidden}
.topbar{grid-column:1/-1;grid-row:1;display:flex;align-items:center;gap:12px;padding:0 16px;border-bottom:1px solid var(--border);background:var(--bg);z-index:30;position:relative}
.sidebar{grid-column:1;grid-row:2;background:var(--bg2);border-right:1px solid var(--border);padding:8px 0;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.main{grid-column:2;grid-row:2;overflow-y:auto;display:flex;flex-direction:column;position:relative}
.main.drag-over{outline:3px dashed var(--accent);outline-offset:-6px;background:rgba(59,130,246,0.06)}
.drop-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;background:rgba(37,99,235,0.06);z-index:10;pointer-events:none;opacity:0;transition:opacity .2s}
.main.drag-over .drop-overlay{opacity:1}
.drop-overlay-icon{font-size:40px;opacity:.6}
.drop-overlay-text{font-size:14px;font-weight:600;color:var(--accent);opacity:.8}

/* Topbar */
.logo{font-weight:700;font-size:15px;color:var(--accent);letter-spacing:-.3px;cursor:pointer;flex-shrink:0;padding:0 4px}
.logo:hover{text-decoration:none;opacity:.85}
.hamburger{display:none;padding:4px 8px;font-size:18px;color:var(--fg2)}
.search-global{flex:1;max-width:360px;position:relative}
.search-global input{width:100%;padding:6px 10px 6px 30px;background:var(--bg2);font-size:12px}
.search-global .search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--fg3);font-size:13px;pointer-events:none}
.storage-wrap{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--fg2);min-width:130px;flex-shrink:0}
.storage-track{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;min-width:60px}
.storage-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .6s}

/* Sidebar */
.nav-item{display:flex;align-items:center;gap:10px;padding:7px 16px;color:var(--fg2);font-size:12.5px;font-weight:500;border-radius:6px;margin:0 8px;cursor:pointer;transition:background .15s,color .15s;text-decoration:none;position:relative}
.nav-item:hover{background:var(--hover);color:var(--fg);text-decoration:none}
.nav-item.active{background:var(--accent-bg);color:var(--accent)}
.nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600}
.sidebar-section{padding:12px 16px 4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--fg3)}

/* Breadcrumb */
.breadcrumb{display:flex;align-items:center;gap:2px;padding:10px 20px 0;font-size:12px;flex-wrap:wrap}
.bc-item{color:var(--accent);cursor:pointer;padding:2px 4px;border-radius:4px}
.bc-item:hover{background:var(--accent-bg);text-decoration:none}
.bc-sep{color:var(--fg3);padding:0 2px;user-select:none}
.bc-current{color:var(--fg2);padding:2px 4px}

/* Action bar */
.action-bar{display:flex;align-items:center;gap:8px;padding:8px 20px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:var(--bg2);border:1px solid var(--border);color:var(--fg)}.btn-secondary:hover{background:var(--bg3)}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{opacity:.9}
.btn-ghost{color:var(--fg2);padding:5px 8px}.btn-ghost:hover{background:var(--bg2);color:var(--fg)}
.btn-icon{padding:4px 6px;font-size:14px;color:var(--fg2);border-radius:var(--radius-sm)}.btn-icon:hover{background:var(--bg2);color:var(--fg)}

/* File table */
.file-table{width:100%;border-collapse:collapse}
.file-table th{text-align:left;font-size:11px;font-weight:600;color:var(--fg3);text-transform:uppercase;letter-spacing:.04em;padding:6px 8px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;position:sticky;top:0;background:var(--bg);z-index:2}
.file-table th:hover{color:var(--fg2)}
.file-table th.r,.file-table td.r{text-align:right}
.file-table th .sort-indicator{font-size:10px;margin-left:2px;opacity:.5}
.file-table td{padding:5px 8px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap}
.file-table tr:last-child td{border-bottom:none}
.file-table tr.file-row:hover td{background:var(--hover)}
.file-table tr.file-row.selected td{background:var(--selected)}
.cell-check{width:32px;text-align:center}
.cell-check input[type=checkbox]{width:14px;height:14px;accent-color:var(--accent);cursor:pointer}
.cell-name{max-width:0;overflow:hidden;text-overflow:ellipsis}
.cell-name a{color:var(--fg);text-decoration:none;display:inline-flex;align-items:center;gap:7px}
.cell-name a:hover{color:var(--accent)}
.file-icon{font-size:16px;flex-shrink:0;line-height:1;width:20px;text-align:center}
.cell-size,.cell-date{color:var(--fg2);font-size:12px;font-variant-numeric:tabular-nums}
.cell-actions{width:80px;text-align:right;opacity:0;transition:opacity .15s}
.file-row:hover .cell-actions{opacity:1}
@media(hover:none){.cell-actions{opacity:1}}
.empty-state{padding:60px 20px;text-align:center;color:var(--fg3)}
.empty-state .empty-icon{font-size:40px;margin-bottom:12px;opacity:.5}
.empty-state p{font-size:13px}
.file-table-wrap{flex:1;overflow:auto;padding:0 20px 20px}

/* State badges */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.badge-local{background:var(--success-bg);color:var(--success)}
.badge-stub{background:var(--bg3);color:var(--fg3)}
.badge-uploading{background:var(--warning-bg);color:var(--warning)}
.badge-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.badge-local .badge-dot{background:var(--success)}
.badge-stub .badge-dot{background:var(--fg3)}
.badge-uploading .badge-dot{background:var(--warning)}

/* Selection bar */
.selection-bar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:8px 16px;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow-lg);z-index:25;transition:transform .25s cubic-bezier(.4,0,.2,1);white-space:nowrap}
.selection-bar.visible{transform:translateX(-50%) translateY(0)}
.sel-count{font-size:12px;font-weight:600;color:var(--fg);margin-right:4px}
.sel-divider{width:1px;height:20px;background:var(--border)}

/* Info panel (slide-over) */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:40;opacity:0;pointer-events:none;transition:opacity .2s}
.panel-overlay.open{opacity:1;pointer-events:auto}
.info-panel{position:fixed;top:0;right:0;bottom:0;width:var(--panel-w);background:var(--bg);border-left:1px solid var(--border);z-index:41;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);overflow-y:auto;box-shadow:var(--shadow-lg);display:flex;flex-direction:column}
.info-panel.open{transform:translateX(0)}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:1}
.panel-header h3{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.panel-close{font-size:18px;color:var(--fg2);padding:2px 6px;border-radius:4px}.panel-close:hover{background:var(--bg2)}
.panel-body{padding:16px;flex:1}
.panel-actions{display:flex;gap:6px;padding:12px 16px;border-top:1px solid var(--border);flex-wrap:wrap}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.info-row:last-child{border-bottom:none}
.info-label{color:var(--fg2);font-weight:500}
.info-value{color:var(--fg);font-family:'SF Mono',Menlo,Monaco,monospace;font-size:11.5px;word-break:break-all;text-align:right;max-width:60%}
.chunk-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}
.chunk-table th{text-align:left;font-weight:600;color:var(--fg3);padding:4px 6px;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase}
.chunk-table td{padding:4px 6px;border-bottom:1px solid var(--border);color:var(--fg2)}
.preview-img{width:100%;border-radius:var(--radius-sm);margin:12px 0;max-height:200px;object-fit:contain;background:var(--bg2)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg);border-radius:12px;box-shadow:var(--shadow-lg);width:420px;max-width:90vw;overflow:hidden}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px}
.modal-header h3{font-size:15px;font-weight:600}
.modal-body{padding:0 20px 16px;font-size:13px;color:var(--fg2)}
.modal-body input{width:100%;margin-top:8px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:12px 20px;border-top:1px solid var(--border);background:var(--bg2)}

/* Toast */
.toast-container{position:fixed;bottom:20px;right:20px;z-index:60;display:flex;flex-direction:column-reverse;gap:8px;pointer-events:none}
.toast{pointer-events:auto;padding:10px 16px;border-radius:var(--radius);font-size:12px;font-weight:500;box-shadow:var(--shadow-lg);animation:toast-in .3s ease;max-width:360px;display:flex;align-items:center;gap:8px}
.toast-success{background:var(--success-bg);color:var(--success);border:1px solid var(--success)}
.toast-error{background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger)}
.toast-info{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent)}
@keyframes toast-in{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Cards */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;padding:4px 0}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:box-shadow .15s}
.card:hover{box-shadow:var(--shadow)}
.card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--fg3);margin-bottom:8px}
.card-value{font-size:22px;font-weight:700;color:var(--fg);font-variant-numeric:tabular-nums}
.card-sub{font-size:11px;color:var(--fg2);margin-top:4px}
.card-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:10px}
.card-bar-fill{height:100%;border-radius:3px;transition:width .6s}

/* Upload cards */
.upload-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px}
.upload-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.upload-name.fail{color:var(--danger)}
.upload-dir{font-size:11px;color:var(--fg3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.upload-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin:8px 0 4px}
.upload-bar-fill{height:100%;background:var(--success);border-radius:3px;transition:width .4s}
.upload-bar-fill.fail{background:var(--danger)}
.upload-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--fg2)}

/* Tree */
.tree-node{font-size:12.5px;white-space:nowrap}
.tree-node a{color:var(--fg);text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.tree-node a:hover{color:var(--accent)}
.tree-indent{color:var(--border);user-select:none}
.tree-leaf{color:var(--fg2)}
.tree-size{color:var(--fg3);font-size:11px;margin-left:6px;font-variant-numeric:tabular-nums}

/* Search */
.search-form{display:flex;gap:8px;padding:0 0 12px}
.search-form input{flex:1}

/* Page container */
.page{padding:16px 20px 40px}
.page-title{font-size:18px;font-weight:700;margin-bottom:16px}
.section-title{font-size:13px;font-weight:600;color:var(--fg2);margin:20px 0 8px;text-transform:uppercase;letter-spacing:.04em}

/* Health indicator */
.health-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.health-dot.ok{background:var(--success)}
.health-dot.degraded{background:var(--warning)}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--bg3);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
.loading-center{display:flex;align-items:center;justify-content:center;padding:60px;gap:8px;color:var(--fg3)}

/* Upload Drawer */
.upload-drawer{position:fixed;bottom:0;right:20px;width:380px;max-height:420px;background:var(--bg);border:1px solid var(--border);border-bottom:none;border-radius:10px 10px 0 0;box-shadow:var(--shadow-lg);z-index:55;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow:hidden}
.upload-drawer.visible{transform:translateY(0)}
.upload-drawer.minimized .upload-drawer-body{display:none}
.upload-drawer-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;flex-shrink:0}
.upload-drawer-header:hover{background:var(--bg3)}
.upload-drawer-title{font-size:13px;font-weight:600;color:var(--fg);flex:1;display:flex;align-items:center;gap:6px}
.upload-drawer-count{font-size:11px;font-weight:500;color:var(--fg2);background:var(--bg3);padding:1px 7px;border-radius:10px}
.upload-drawer-actions{display:flex;gap:2px}
.upload-drawer-actions button{background:none;border:none;color:var(--fg2);font-size:14px;padding:2px 6px;border-radius:4px;cursor:pointer;line-height:1}
.upload-drawer-actions button:hover{background:var(--bg3);color:var(--fg)}
.upload-drawer-body{overflow-y:auto;flex:1;max-height:320px}
.upload-drawer-item{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border);font-size:12px;transition:background .15s}
.upload-drawer-item:last-child{border-bottom:none}
.upload-drawer-item:hover{background:var(--bg2)}
.upload-drawer-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px}
.upload-drawer-fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--fg)}
.upload-drawer-fname.fail{color:var(--danger)}
.upload-drawer-fsize{font-size:11px;color:var(--fg3);flex-shrink:0;font-variant-numeric:tabular-nums}
.upload-drawer-spinner{width:14px;height:14px;border:2px solid var(--bg3);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
.upload-drawer-summary{padding:8px 14px;font-size:11px;color:var(--fg2);background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;gap:6px}
.upload-drawer-progress{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.upload-drawer-progress-fill{height:100%;background:var(--success);border-radius:2px;transition:width .3s}
.upload-drawer-progress-fill.has-errors{background:var(--warning)}

/* Keyboard help modal */
.kbd-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:70;display:none;align-items:center;justify-content:center}
.kbd-overlay.open{display:flex}
.kbd-modal{background:var(--bg);border-radius:12px;box-shadow:var(--shadow-lg);width:480px;max-width:90vw;max-height:80vh;overflow:hidden;display:flex;flex-direction:column}
.kbd-modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid var(--border)}
.kbd-modal-header h3{font-size:15px;font-weight:600}
.kbd-modal-body{padding:12px 20px 20px;overflow-y:auto}
.kbd-section{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--fg3);margin:12px 0 6px}
.kbd-section:first-child{margin-top:0}
.kbd-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;font-size:12px;color:var(--fg2)}
.kbd-key{display:inline-block;background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-family:'SF Mono',Menlo,Monaco,monospace;font-size:11px;color:var(--fg);min-width:22px;text-align:center}

/* Browse footer */
.browse-footer{padding:6px 20px 12px;font-size:11px;color:var(--fg3);border-top:1px solid var(--border)}

/* Responsive */
@media(max-width:768px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;left:calc(-1 * var(--sidebar-w));top:var(--topbar-h);bottom:0;z-index:35;transition:left .25s;box-shadow:var(--shadow-lg)}
  .sidebar.open{left:0}
  .hamburger{display:block}
  .search-global{max-width:none}
  .info-panel{width:100vw}
  .selection-bar{left:8px;right:8px;transform:translateX(0) translateY(80px)}
  .selection-bar.visible{transform:translateX(0) translateY(0)}
  --panel-w:100vw;
  .upload-drawer{left:8px;right:8px;width:auto}
}

/* Keyboard focus ring */
.file-row.focused td:first-child{box-shadow:inset 3px 0 0 var(--accent)}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
</style>
</head>
<body>

<div class="app" id="app">
  <header class="topbar">
    <button class="hamburger" id="hamburger" title="Toggle sidebar">☰</button>
    <span class="logo" data-action="goHome">pdrive</span>
    <div class="search-global">
      <span class="search-icon">⌕</span>
      <input type="text" id="global-search" placeholder="Search files… ( / )" autocomplete="off">
    </div>
    <div class="storage-wrap">
      <div class="storage-track"><div class="storage-fill" id="storage-fill"></div></div>
      <span id="storage-label">—</span>
    </div>
  </header>

  <nav class="sidebar" id="sidebar">
    <div class="sidebar-section">Navigation</div>
    <a class="nav-item active" data-action="goPage" data-page="browse"><span class="nav-icon">📂</span>Files</a>
    <a class="nav-item" data-action="goPage" data-page="dashboard"><span class="nav-icon">📊</span>Dashboard</a>
    <a class="nav-item" data-action="goPage" data-page="uploads"><span class="nav-icon">📤</span>Uploads<span class="nav-badge" id="upload-badge" style="display:none">0</span></a>
    <a class="nav-item" data-action="goPage" data-page="search"><span class="nav-icon">🔍</span>Search</a>
    <a class="nav-item" data-action="goPage" data-page="tree"><span class="nav-icon">🌳</span>Tree</a>

<div class="info-panel" id="info-panel"></div>

<script>
(function(){
'use strict';

// ─── Utilities ──────────────────────────────────────────────────────────────

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function fmtSize(b){
  if(b==null||b<0)return'—';
  if(b>=1099511627776)return(b/1099511627776).toFixed(1)+' TB';
  if(b>=1073741824)return(b/1073741824).toFixed(1)+' GB';
  if(b>=1048576)return(b/1048576).toFixed(1)+' MB';
  if(b>=1024)return(b/1024).toFixed(1)+' KB';
  return b+' B';
}

function fmtDate(ts){
  if(!ts)return'—';
  var d=new Date(ts*1000),now=new Date(),diff=(now-d)/1000;
  if(diff<60)return'just now';
  if(diff<3600)return Math.floor(diff/60)+'m ago';
  if(diff<86400)return Math.floor(diff/3600)+'h ago';
  if(diff<604800)return Math.floor(diff/86400)+'d ago';
  if(d.getFullYear()===now.getFullYear())return d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
  return d.toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'});
}

function fmtDateFull(ts){
  if(!ts)return'—';
  return new Date(ts*1000).toLocaleString();
}

function fmtUptime(s){
  if(s<60)return Math.floor(s)+'s';
  if(s<3600)return Math.floor(s/60)+'m '+Math.floor(s%60)+'s';
  var h=Math.floor(s/3600);
  return h+'h '+Math.floor((s%3600)/60)+'m';
}

function fileIcon(name,isDir){
  if(isDir)return'📁';
  var ext=(name.split('.').pop()||'').toLowerCase();
  if('mkv,mp4,avi,mov,wmv,m4v,ts,webm'.split(',').indexOf(ext)>-1)return'🎬';
  if('mp3,flac,aac,m4a,wav,ogg,opus'.split(',').indexOf(ext)>-1)return'🎵';
  if('jpg,jpeg,png,gif,webp,heic,bmp,svg,ico'.split(',').indexOf(ext)>-1)return'🖼️';
  if('zip,rar,7z,tar,gz,bz2,xz,zst'.split(',').indexOf(ext)>-1)return'📦';
  if(ext==='pdf')return'📄';
  if('doc,docx,xls,xlsx,ppt,pptx,odt,ods'.split(',').indexOf(ext)>-1)return'📝';
  if('py,go,js,ts,html,css,sh,rb,java,c,cpp,h,rs,swift,json,yaml,yml,toml,xml,sql,md'.split(',').indexOf(ext)>-1)return'💻';
  if('iso,dmg,img'.split(',').indexOf(ext)>-1)return'💿';
  return'📄';
}

function isImageFile(name){
  var ext=(name.split('.').pop()||'').toLowerCase();
  return'jpg,jpeg,png,gif,webp,bmp,svg,ico'.split(',').indexOf(ext)>-1;
}

function pathJoin(){
  var parts=Array.prototype.slice.call(arguments);
  var r=parts.join('/').replace(/\/+/g,'/');
  if(r.length>1&&r.endsWith('/'))r=r.slice(0,-1);
  return r||'/';
}

function pathParent(p){
  if(p==='/'||!p)return'/';
  var parts=p.replace(/\/$/,'').split('/');
  parts.pop();
  return parts.join('/')||'/';
}

function pathBasename(p){
  if(!p||p==='/')return'/';
  return p.replace(/\/$/,'').split('/').pop()||'';
}

// ─── API Client ─────────────────────────────────────────────────────────────

var api={
  _get:function(url){
    return fetch(url).then(function(r){
      if(!r.ok)return r.text().then(function(t){throw new Error(t)});
      return r.json();
    });
  },
  _post:function(url){
    return fetch(url,{method:'POST'}).then(function(r){
      if(!r.ok)return r.text().then(function(t){throw new Error(t)});
      return r.json();
    });
  },
  ls:function(p){return api._get('/api/ls?path='+encodeURIComponent(p||'/'))},
  status:function(){return api._get('/api/status')},
  health:function(){return api._get('/api/health')},
  remotes:function(){return api._get('/api/remotes')},
  uploads:function(){return api._get('/api/uploads')},
  metrics:function(){return api._get('/api/metrics')},
  info:function(p){return api._get('/api/info?path='+encodeURIComponent(p))},
  tree:function(p){return api._get('/api/tree?path='+encodeURIComponent(p||'/'))},
  find:function(pattern,root){return api._get('/api/find?pattern='+encodeURIComponent(pattern)+'&path='+encodeURIComponent(root||'/'))},
  du:function(p){return api._get('/api/du?path='+encodeURIComponent(p||'/'))},
  pin:function(p){return api._post('/api/pin?path='+encodeURIComponent(p))},
  unpin:function(p){return api._post('/api/unpin?path='+encodeURIComponent(p))},
  del:function(p){return api._post('/api/delete?path='+encodeURIComponent(p))},
  mv:function(src,dst){return api._post('/api/mv?src='+encodeURIComponent(src)+'&dst='+encodeURIComponent(dst))},
  mkdir:function(p){return api._post('/api/mkdir?path='+encodeURIComponent(p))},
  downloadUrl:function(p){return'/api/download?path='+encodeURIComponent(p)},
  upload:function(file,dir){
    var fd=new FormData();
    fd.append('file',file);
    fd.append('dir',dir||'/');
    return fetch('/api/upload',{method:'POST',body:fd}).then(function(r){
      if(!r.ok)return r.text().then(function(t){throw new Error(t)});
      return r.json();
    });
  },
  verify:function(p){
    return fetch('/api/verify?path='+encodeURIComponent(p)).then(function(r){
      return r.json();
    });
  },
  activity:function(){return api._get('/api/activity')}
};

// ─── State ──────────────────────────────────────────────────────────────────

var S={
  page:'browse',
  path:'/',
  listing:null,
  selected:new Set(),
  sortCol:'name',
  sortAsc:true,
  focusIdx:-1,
  infoPanelPath:null,
  infoData:null,
  uploads:[],
  searchPattern:'',
  searchRoot:'/',
  searchResults:null,
  treeRoot:'/',
  treeData:null,
  loading:false
};

// ─── Toast ──────────────────────────────────────────────────────────────────

var toastId=0;
function toast(msg,type){
  type=type||'info';
  var id=++toastId;
  var el=document.getElementById('toasts');
  var d=document.createElement('div');
  d.className='toast toast-'+type;
  d.id='toast-'+id;
  d.textContent=msg;
  el.appendChild(d);
  setTimeout(function(){var t=document.getElementById('toast-'+id);if(t)t.remove()},4000);
}

// ─── Modal ──────────────────────────────────────────────────────────────────

var modalResolve=null;
function showModal(opts){
  // opts: {title, message, input, inputValue, inputPlaceholder, confirmLabel, danger}
  return new Promise(function(resolve){
    modalResolve=resolve;
    var overlay=document.getElementById('modal-overlay');
    var html='<div class="modal"><div class="modal-header"><h3>'+esc(opts.title)+'</h3>'
      +'<button class="btn-icon" data-action="modalClose" title="Close">✕</button></div>'
      +'<div class="modal-body">'+esc(opts.message||'');
    if(opts.input)html+='<input type="text" id="modal-input" value="'+esc(opts.inputValue||'')+'" placeholder="'+esc(opts.inputPlaceholder||'')+'" autofocus>';
    html+='</div><div class="modal-footer">'
      +'<button class="btn btn-secondary" data-action="modalClose">Cancel</button>'
      +'<button class="btn '+(opts.danger?'btn-danger':'btn-primary')+'" data-action="modalConfirm">'
      +esc(opts.confirmLabel||'Confirm')+'</button>'
      +'</div></div>';
    overlay.innerHTML=html;
    overlay.classList.add('open');
    var inp=document.getElementById('modal-input');
    if(inp){inp.focus();inp.select();}
  });
}

function closeModal(result){
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('modal-overlay').innerHTML='';
  if(modalResolve){modalResolve(result);modalResolve=null;}
}

// ─── Info Panel ─────────────────────────────────────────────────────────────

function openInfoPanel(p){
  S.infoPanelPath=p;
  S.infoData=null;
  var panel=document.getElementById('info-panel');
  var overlay=document.getElementById('panel-overlay');
  panel.innerHTML='<div class="panel-header"><h3>'+esc(pathBasename(p))+'</h3><button class="panel-close" data-action="closePanel">✕</button></div>'
    +'<div class="panel-body"><div class="loading-center"><span class="spinner"></span></div></div>';
  panel.classList.add('open');
  overlay.classList.add('open');
  api.info(p).then(function(data){
    S.infoData=data;
    renderInfoContent(data,panel);
  }).catch(function(e){
    panel.querySelector('.panel-body').innerHTML='<div class="empty-state"><p>'+esc(e.message)+'</p></div>';
  });
}

function renderInfoContent(data,panel){
  var body='';

  // Preview for images
  if(isImageFile(data.path)){
    body+='<img class="preview-img" src="'+esc(api.downloadUrl(data.path))+'" alt="preview" loading="lazy" onerror="this.style.display=\'none\'">';
  }

  body+='<div class="info-row"><span class="info-label">Path</span><span class="info-value">'+esc(data.path)+'</span></div>';
  body+='<div class="info-row"><span class="info-label">Size</span><span class="info-value">'+esc(fmtSize(data.size_bytes))+'</span></div>';
  body+='<div class="info-row"><span class="info-label">Created</span><span class="info-value">'+esc(fmtDateFull(data.created_at))+'</span></div>';
  body+='<div class="info-row"><span class="info-label">Modified</span><span class="info-value">'+esc(fmtDateFull(data.modified_at))+'</span></div>';
  body+='<div class="info-row"><span class="info-label">State</span><span class="info-value">'+esc(data.upload_state)+'</span></div>';
  if(data.sha256){
    body+='<div class="info-row"><span class="info-label">SHA-256</span><span class="info-value" style="font-size:10px">'+esc(data.sha256)+'</span></div>';
  }

  // Chunks
  if(data.chunks&&data.chunks.length){
    body+='<div style="margin-top:16px"><span class="info-label">Chunks ('+data.chunks.length+')</span>'
      +'<table class="chunk-table"><thead><tr><th>#</th><th>Size</th><th>Encrypted</th><th>Providers</th></tr></thead><tbody>';
    data.chunks.forEach(function(c){
      body+='<tr><td>'+c.sequence+'</td><td>'+fmtSize(c.size_bytes)+'</td><td>'+fmtSize(c.encrypted_size)+'</td>'
        +'<td>'+esc((c.providers||[]).join(', '))+'</td></tr>';
    });
    body+='</tbody></table></div>';
  }

  panel.querySelector('.panel-body').innerHTML=body;

  // Actions
  var actions='<button class="btn btn-primary" data-action="download" data-path="'+esc(data.path)+'">⬇ Download</button>'
    +'<button class="btn btn-secondary" data-action="verifyFile" data-path="'+esc(data.path)+'">✓ Verify</button>'
    +'<button class="btn btn-secondary" data-action="pin" data-path="'+esc(data.path)+'">📌 Pin</button>'
    +'<button class="btn btn-secondary" data-action="unpin" data-path="'+esc(data.path)+'">☁️ Unpin</button>'
    +'<button class="btn btn-secondary" data-action="moveFile" data-path="'+esc(data.path)+'">📁 Move</button>'
    +'<button class="btn btn-danger" data-action="deleteFile" data-path="'+esc(data.path)+'">🗑 Delete</button>';

  var existing=panel.querySelector('.panel-actions');
  if(existing)existing.remove();
  var actionsDiv=document.createElement('div');
  actionsDiv.className='panel-actions';
  actionsDiv.innerHTML=actions;
  panel.appendChild(actionsDiv);
}

function closeInfoPanel(){
  S.infoPanelPath=null;
  S.infoData=null;
  document.getElementById('info-panel').classList.remove('open');
  document.getElementById('panel-overlay').classList.remove('open');
}

// ─── Selection Bar ──────────────────────────────────────────────────────────

function updateSelectionBar(){
  var bar=document.getElementById('selection-bar');
  var n=S.selected.size;
  if(n===0){
    bar.classList.remove('visible');
    return;
  }
  bar.classList.add('visible');
  bar.innerHTML='<span class="sel-count">'+n+' selected</span>'
    +'<span class="sel-divider"></span>'
    +'<button class="btn btn-secondary" data-action="bulkPin">📌 Pin</button>'
    +'<button class="btn btn-secondary" data-action="bulkUnpin">☁️ Unpin</button>'
    +'<button class="btn btn-secondary" data-action="bulkDownload">⬇ Download</button>'
    +'<button class="btn btn-danger" data-action="bulkDelete">🗑 Delete</button>'
    +'<span class="sel-divider"></span>'
    +'<button class="btn btn-ghost" data-action="clearSelection">✕ Clear</button>';
}

// ─── Sorting ────────────────────────────────────────────────────────────────

function sortItems(dirs,files){
  var d=(dirs||[]).slice().sort();
  var f=(files||[]).slice();
  var col=S.sortCol,asc=S.sortAsc;
  f.sort(function(a,b){
    var va,vb;
    if(col==='name'){va=a.name.toLowerCase();vb=b.name.toLowerCase();return asc?va.localeCompare(vb):vb.localeCompare(va)}
    if(col==='size'){va=a.size;vb=b.size;return asc?va-vb:vb-va}
    if(col==='state'){va=a.local_state||'';vb=b.local_state||'';return asc?va.localeCompare(vb):vb.localeCompare(va)}
    if(col==='modified'){va=a.modified_at||0;vb=b.modified_at||0;return asc?va-vb:vb-va}
    return 0;
  });
  return{dirs:d,files:f};
}

function sortIndicator(col){
  if(S.sortCol!==col)return'';
  return' <span class="sort-indicator">'+(S.sortAsc?'▲':'▼')+'</span>';
}

// ─── Page: Browse ───────────────────────────────────────────────────────────

function renderBrowse(){
  var html='';
  // Breadcrumb
  html+='<div class="breadcrumb">';
  html+='<a class="bc-item" data-action="navigate" data-path="/">pdrive</a>';
  if(S.path&&S.path!=='/'){
    var parts=S.path.replace(/^\//,'').replace(/\/$/,'').split('/');
    var built='';
    for(var i=0;i<parts.length;i++){
      built+='/'+parts[i];
      html+='<span class="bc-sep">/</span>';
      if(i===parts.length-1){
        html+='<span class="bc-current">'+esc(parts[i])+'</span>';
      } else {
        html+='<a class="bc-item" data-action="navigate" data-path="'+esc(built)+'">'+esc(parts[i])+'</a>';
      }
    }
  }
  html+='</div>';

  // Action bar
  html+='<div class="action-bar">';
  html+='<button class="btn btn-secondary" data-action="newFolder">+ New Folder</button>';
  html+='<button class="btn btn-secondary" data-action="uploadFile">⬆ Upload Files</button>';
  html+='<button class="btn btn-secondary" data-action="uploadFolder">📁 Upload Folder</button>';
  html+='<input type="file" id="upload-input" style="display:none" multiple>';
  html+='<input type="file" id="upload-folder-input" style="display:none" webkitdirectory>';
  html+='<div style="flex:1"></div>';
  html+='<button class="btn-ghost" data-action="duHere" title="Disk usage" style="font-size:12px">💾 Usage</button>';
  if(S.path!=='/'){
    html+='<button class="btn-ghost" data-action="navigate" data-path="'+esc(pathParent(S.path))+'" title="Go up">⬆ Up</button>';
  }
  html+='</div>';

  // File table
  if(S.loading&&!S.listing){
    html+='<div class="loading-center"><span class="spinner"></span> Loading…</div>';
  } else if(S.listing){
    var sorted=sortItems(S.listing.dirs,S.listing.files);
    var dirs=sorted.dirs,files=sorted.files;

    if(!dirs.length&&!files.length){
      html+='<div class="empty-state"><div class="empty-icon">📭</div><p>This directory is empty</p></div>';
    } else {
      html+='<div class="file-table-wrap"><table class="file-table"><thead><tr>';
      html+='<th class="cell-check"><input type="checkbox" data-action="selectAll" title="Select all"></th>';
      html+='<th data-action="sort" data-col="name">Name'+sortIndicator('name')+'</th>';
      html+='<th class="r" data-action="sort" data-col="size" style="width:90px">Size'+sortIndicator('size')+'</th>';
      html+='<th data-action="sort" data-col="state" style="width:90px">State'+sortIndicator('state')+'</th>';
      html+='<th class="r" data-action="sort" data-col="modified" style="width:110px">Modified'+sortIndicator('modified')+'</th>';
      html+='<th style="width:80px"></th>';
      html+='</tr></thead><tbody>';

      dirs.forEach(function(d){
        var fp=pathJoin(S.path,d);
        html+='<tr class="file-row" data-filepath="'+esc(fp)+'" data-isdir="1">';
        html+='<td class="cell-check"></td>';
        html+='<td class="cell-name"><a data-action="navigate" data-path="'+esc(fp)+'"><span class="file-icon">📁</span>'+esc(d)+'</a></td>';
        html+='<td class="cell-size r">—</td><td></td><td class="cell-date r">—</td>';
        html+='<td class="cell-actions"><button class="btn-icon" data-action="deleteFile" data-path="'+esc(fp)+'" title="Delete">🗑</button></td>';
        html+='</tr>';
      });

      files.forEach(function(f){
        var fp=f.path;
        var sel=S.selected.has(fp);
        var focused=false;
        var icon=fileIcon(f.name,false);
        var stateClass=f.local_state==='local'?'badge-local':f.local_state==='uploading'?'badge-uploading':'badge-stub';
        var stateLabel=f.local_state==='local'?'local':f.local_state==='uploading'?'uploading':'cloud';

        html+='<tr class="file-row'+(sel?' selected':'')+'" data-filepath="'+esc(fp)+'" data-state="'+esc(f.local_state||'stub')+'">';
        html+='<td class="cell-check"><input type="checkbox" data-action="selectFile" data-path="'+esc(fp)+'"'+(sel?' checked':'')+'></td>';
        html+='<td class="cell-name"><a data-action="showInfo" data-path="'+esc(fp)+'"><span class="file-icon">'+icon+'</span>'+esc(f.name)+'</a></td>';
        html+='<td class="cell-size r">'+fmtSize(f.size)+'</td>';
        html+='<td><span class="badge '+stateClass+'"><span class="badge-dot"></span>'+stateLabel+'</span></td>';
        html+='<td class="cell-date r">'+fmtDate(f.modified_at)+'</td>';
        html+='<td class="cell-actions">'
          +'<button class="btn-icon" data-action="download" data-path="'+esc(fp)+'" title="Download">⬇</button>'
          +'<button class="btn-icon" data-action="showInfo" data-path="'+esc(fp)+'" title="Info">ℹ</button>'
          +'</td>';
        html+='</tr>';
      });
      html+='</tbody></table></div>';

      // Browse footer with counts
      html+='<div class="browse-footer">'+dirs.length+' folder'+(dirs.length!==1?'s':'')+', '+files.length+' file'+(files.length!==1?'s':'')+'</div>';
    }
  }
  return html;
}

function loadBrowse(p){
  p=p||S.path||'/';
  S.path=p;
  S.loading=true;
  S.selected.clear();
  updateSelectionBar();
  renderPage();
  api.ls(p).then(function(data){
    S.listing=data;
    S.path=data.path||p;
    S.loading=false;
    renderPage();
  }).catch(function(e){
    S.loading=false;
    S.listing={path:p,dirs:[],files:[]};
    renderPage();
    toast('Failed to load directory: '+e.message,'error');
  });
}

// ─── Page: Dashboard ────────────────────────────────────────────────────────

function renderDashboard(){
  var html='<div class="page"><h2 class="page-title">Dashboard</h2>';
  html+='<div id="dash-health"><div class="loading-center"><span class="spinner"></span></div></div>';
  html+='<div class="section-title">Storage Providers</div>';
  html+='<div id="dash-providers"><div class="loading-center"><span class="spinner"></span></div></div>';
  html+='</div>';
  return html;
}

function loadDashboard(){
  renderPage();
  Promise.all([api.health(),api.status(),api.remotes().catch(function(){return{remotes:[]}})]).then(function(results){
    var health=results[0],status=results[1],remotes=results[2];

    // Health
    var hEl=document.getElementById('dash-health');
    if(hEl){
      var hClass=health.status==='ok'?'ok':'degraded';
      hEl.innerHTML='<div class="card-grid">'
        +'<div class="card"><div class="card-title">Health</div><div class="card-value"><span class="health-dot '+hClass+'"></span> '+esc(health.status)+'</div>'
        +'<div class="card-sub">Uptime: '+fmtUptime(health.uptime_seconds)+' · In-flight: '+health.in_flight_uploads+' · DB: '+(health.db_ok?'✓':'✗')+'</div></div>'
        +'<div class="card"><div class="card-title">Total Files</div><div class="card-value">'+status.total_files.toLocaleString()+'</div>'
        +'<div class="card-sub">'+fmtSize(status.total_bytes)+' total</div></div>'
        +'</div>';
    }

    // Providers
    var pEl=document.getElementById('dash-providers');
    if(pEl){
      var remoteLookup={};
      (remotes.remotes||[]).forEach(function(r){remoteLookup[r.name]=r});
      if(!status.providers||!status.providers.length){
        pEl.innerHTML='<div class="empty-state"><p>No providers configured</p></div>';
      } else {
        var cards='<div class="card-grid">';
        status.providers.forEach(function(p){
          var remote=remoteLookup[p.name]||{};
          var total=p.quota_total_bytes||0;
          var free=p.quota_free_bytes||0;
          var used=total>0?total-free:0;
          var usedByPd=p.quota_used_by_pdrive||0;
          var pct=total>0?Math.min(100,used/total*100):0;
          var barColor=pct>90?'var(--danger)':pct>70?'var(--warning)':'var(--accent)';
          cards+='<div class="card"><div class="card-title">'+esc(p.name);
          if(p.type)cards+=' <span style="opacity:.5;text-transform:none;font-weight:400">('+esc(p.type)+')</span>';
          cards+='</div>';

function buildTree(items,root){
  // Build a nested structure from flat list
  var tree={};
  var totalSize=0;
  items.forEach(function(f){
    // Remove root prefix
    var rel=f.path;
    if(root!=='/'&&rel.startsWith(root))rel=rel.substring(root.length);
    if(rel.startsWith('/'))rel=rel.substring(1);
    var parts=rel.split('/');
    var node=tree;
    for(var i=0;i<parts.length-1;i++){
      if(!node[parts[i]])node[parts[i]]={__children:{}};
      node=node[parts[i]].__children||(node[parts[i]].__children={});
    }
    var fname=parts[parts.length-1];
    node[fname]={__file:true,__size:f.size,__path:f.path};
    totalSize+=f.size||0;
  });

  var html='<div style="font-family:\'SF Mono\',Menlo,Monaco,monospace;font-size:12px;line-height:1.8">';
  html+=renderTreeNode(tree,'',true);
  html+='</div>';
  html+='<div style="padding:10px 0;font-size:11px;color:var(--fg3)">'+items.length+' file(s), '+fmtSize(totalSize)+' total</div>';
  return html;
}

function renderTreeNode(node,prefix,isRoot){
  var html='';
  var keys=Object.keys(node).sort(function(a,b){
    var aDir=node[a].__children!==undefined&&!node[a].__file;
    var bDir=node[b].__children!==undefined&&!node[b].__file;
    if(aDir&&!bDir)return -1;
    if(!aDir&&bDir)return 1;
    return a.localeCompare(b);
  });
  keys.forEach(function(k,i){
    if(k.startsWith('__'))return;
    var entry=node[k];
    var isLast=i===keys.length-1;
    var connector=isRoot?'':( isLast?'└── ':'├── ');
    var nextPrefix=isRoot?'':(prefix+(isLast?'    ':'│   '));

    if(entry.__file){
      html+='<div class="tree-node"><span class="tree-indent">'+esc(prefix+connector)+'</span>'
        +'<a data-action="showInfo" data-path="'+esc(entry.__path)+'">'+fileIcon(k,false)+' '+esc(k)+'</a>'
        +'<span class="tree-size">'+fmtSize(entry.__size)+'</span></div>';
    } else {
      html+='<div class="tree-node"><span class="tree-indent">'+esc(prefix+connector)+'</span>'
        +'<span>📁 <strong>'+esc(k)+'</strong></span></div>';
      if(entry.__children){
        html+=renderTreeNode(entry.__children,nextPrefix,false);
      }
    }
  });
  return html;
}

var _uploadInProgress=false;
var _uploadCancelled=false;

// ── Upload Progress Drawer ─────────────────────────────────────────────────

var uploadTracker={
  items:[],       // {name,size,status:'queued'|'uploading'|'done'|'fail',error:null}
  minimized:false,
  visible:false,
  _closeTimer:null,

  start:function(fileList){
    // fileList: [{name,size}]
    if(this._closeTimer){clearTimeout(this._closeTimer);this._closeTimer=null;}
    this.items=fileList.map(function(f){return{name:f.name,size:f.size,status:'queued',error:null}});
    this.minimized=false;
    this.visible=true;
    this.render();
  },
  markUploading:function(idx){
    if(this.items[idx])this.items[idx].status='uploading';
    this.render();
  },
  markDone:function(idx){
    if(this.items[idx])this.items[idx].status='done';
    this.render();
  },
  markFailed:function(idx,err){
    if(this.items[idx]){this.items[idx].status='fail';this.items[idx].error=err;}
    this.render();
  },
  counts:function(){
    var d=0,f=0,q=0,u=0;
    this.items.forEach(function(it){
      if(it.status==='done')d++;
      else if(it.status==='fail')f++;
      else if(it.status==='uploading')u++;
      else q++;
    });
    return{done:d,fail:f,queued:q,uploading:u,total:this.items.length};
  },
  toggle:function(){
    this.minimized=!this.minimized;
    this.render();
  },
  close:function(){
    this.visible=false;
    this.items=[];
    if(this._closeTimer){clearTimeout(this._closeTimer);this._closeTimer=null;}
    var el=document.getElementById('upload-drawer');
    el.classList.remove('visible');
  },
  scheduleAutoMinimize:function(){
    var self=this;
    this._closeTimer=setTimeout(function(){
      self.minimized=true;
      self.render();
    },3000);
  },
  render:function(){
    var el=document.getElementById('upload-drawer');
    if(!this.visible||!this.items.length){el.classList.remove('visible');el.innerHTML='';return;}
    el.classList.add('visible');
    el.classList.toggle('minimized',this.minimized);

    var c=this.counts();
    var pct=c.total>0?Math.round((c.done+c.fail)/c.total*100):0;

    // Header
    var html='<div class="upload-drawer-header" id="upload-drawer-toggle">';
    html+='<div class="upload-drawer-title">';
    if(c.done+c.fail<c.total){
      html+='<span class="upload-drawer-spinner"></span> Uploading…';
    } else if(c.fail>0){
      html+='⚠️ Upload complete with errors';
    } else {
      html+='✅ Upload complete';
    }
    html+='</div>';
    html+='<span class="upload-drawer-count">'+(c.done+c.fail)+'/'+c.total+'</span>';
    html+='<div class="upload-drawer-actions">';
    if(c.done+c.fail<c.total)html+='<button id="upload-drawer-cancel" title="Cancel remaining">◼</button>';
    html+='<button id="upload-drawer-min" title="'+(this.minimized?'Expand':'Minimize')+'">'+(this.minimized?'▲':'▼')+'</button>';
    if(c.done+c.fail>=c.total)html+='<button id="upload-drawer-close" title="Close">✕</button>';
    html+='</div></div>';

    // Progress summary bar
    html+='<div class="upload-drawer-summary">';
    html+='<span>'+(c.done+c.fail)+' of '+c.total+' complete'+(c.fail?' · '+c.fail+' failed':'')+'</span>';
    html+='<div class="upload-drawer-progress"><div class="upload-drawer-progress-fill'+(c.fail?' has-errors':'')+'" style="width:'+pct+'%"></div></div>';
    html+='</div>';

    // File list body
    html+='<div class="upload-drawer-body">';
    this.items.forEach(function(it){
      var icon='';
      if(it.status==='done')icon='<span style="color:var(--success)">✓</span>';
      else if(it.status==='fail')icon='<span style="color:var(--danger)">✗</span>';
      else if(it.status==='uploading')icon='<span class="upload-drawer-spinner"></span>';
      else icon='<span style="color:var(--fg3)">○</span>';

      html+='<div class="upload-drawer-item">';
      html+='<div class="upload-drawer-icon">'+icon+'</div>';
      html+='<div class="upload-drawer-fname'+(it.status==='fail'?' fail':'')+'">'+esc(it.name)+(it.error?' — '+esc(it.error):'')+'</div>';
      html+='<div class="upload-drawer-fsize">'+fmtSize(it.size)+'</div>';
      html+='</div>';
    });
    html+='</div>';

    el.innerHTML=html;

    // Wire up toggle/close
    var self=this;
    var cancelBtn=document.getElementById('upload-drawer-cancel');
    if(cancelBtn)cancelBtn.addEventListener('click',function(e){e.stopPropagation();_uploadCancelled=true;});
    var toggleBtn=document.getElementById('upload-drawer-min');
    if(toggleBtn)toggleBtn.addEventListener('click',function(e){e.stopPropagation();self.toggle()});
    var closeBtn=document.getElementById('upload-drawer-close');
    if(closeBtn)closeBtn.addEventListener('click',function(e){e.stopPropagation();self.close()});
    document.getElementById('upload-drawer-toggle').addEventListener('click',function(){self.toggle()});
  }
};

function doUploadFiles(files){
  if(!files||!files.length)return;
  if(_uploadInProgress){toast('Upload already in progress…','info');return;}
  _uploadInProgress=true;
  _uploadCancelled=false;
  var dir=S.path||'/';
  var todo=[];
  for(var i=0;i<files.length;i++){todo.push({file:files[i],dir:dir})}
  var total=todo.length,idx=0,done=0,failed=0;
  uploadTracker.start(todo.map(function(t){return{name:t.file.name,size:t.file.size}}));
  function next(){
    if(_uploadCancelled){
      for(var c=idx;c<total;c++)uploadTracker.markFailed(c,'cancelled');
      _uploadInProgress=false;
      _uploadCancelled=false;
      uploadTracker.scheduleAutoMinimize();
      if(S.page==='browse')loadBrowse(S.path);
      return;
    }
    if(idx>=total){
      _uploadInProgress=false;
      uploadTracker.scheduleAutoMinimize();
      if(S.page==='browse')loadBrowse(S.path);
      return;
    }
    var cur=idx;
    idx++;
    uploadTracker.markUploading(cur);
    api.upload(todo[cur].file,todo[cur].dir).then(function(){
      done++;
      uploadTracker.markDone(cur);
      next();
    }).catch(function(e){
      failed++;
      uploadTracker.markFailed(cur,e.message);
      next();
    });
  }
  next();
}

// Upload files with relative paths (from folder input or directory drop).
function doUploadWithPaths(entries){
  if(!entries||!entries.length)return;
  if(_uploadInProgress){toast('Upload already in progress…','info');return;}
  _uploadInProgress=true;
  _uploadCancelled=false;
  var baseDir=S.path||'/';
  var todo=entries.map(function(e){return{file:e.file,dir:baseDir==="/"?baseDir+e.relDir:baseDir+"/"+e.relDir}});
  var total=todo.length,idx=0,done=0,failed=0;
  uploadTracker.start(todo.map(function(t){return{name:t.file.name,size:t.file.size}}));
  function next(){
    if(_uploadCancelled){
      for(var c=idx;c<total;c++)uploadTracker.markFailed(c,'cancelled');
      _uploadInProgress=false;
      _uploadCancelled=false;
      uploadTracker.scheduleAutoMinimize();
      if(S.page==='browse')loadBrowse(S.path);
      return;
    }
    if(idx>=total){
      _uploadInProgress=false;
      uploadTracker.scheduleAutoMinimize();
      if(S.page==='browse')loadBrowse(S.path);
      return;
    }
    var cur=idx;
    idx++;
    uploadTracker.markUploading(cur);
    api.upload(todo[cur].file,todo[cur].dir).then(function(){
      done++;
      uploadTracker.markDone(cur);
      next();
    }).catch(function(e){
      failed++;
      uploadTracker.markFailed(cur,e.message);
      next();
    });
  }
  next();
}

// Recursively read a DataTransferItem directory entry into a flat list.
function readEntryRecursive(entry,basePath,results,done){
  if(entry.isFile){
    entry.file(function(f){
      results.push({file:f,relDir:basePath});
      done();
    },function(){done()});
  } else if(entry.isDirectory){
    var dirPath=basePath?basePath+'/'+entry.name:entry.name;
    var reader=entry.createReader();
    var allEntries=[];
    // readEntries may return partial results; call repeatedly until empty.
    (function readBatch(){
      reader.readEntries(function(batch){
        if(!batch.length){
          if(!allEntries.length){done();return;}
          var pending=allEntries.length;
          allEntries.forEach(function(child){
            readEntryRecursive(child,dirPath,results,function(){pending--;if(!pending)done();});
          });
          return;
        }
        allEntries=allEntries.concat(Array.from(batch));
        readBatch();
      },function(){done()});
    })();
  } else {done();}
}

function doVerify(p){
  toast('Verifying '+pathBasename(p)+'…','info');
  api.verify(p).then(function(res){
    if(res.ok){
      toast('✓ '+pathBasename(p)+' integrity OK','success');
    } else {
      toast('✗ '+pathBasename(p)+': '+(res.error||'failed'),'error');
    }
  }).catch(function(e){toast('Verify error: '+e.message,'error')});
}

// Bulk actions
function doBulkAction(action){
  var paths=Array.from(S.selected);
  if(!paths.length)return;

  if(action==='delete'){
    showModal({title:'Delete '+paths.length+' items',message:'This cannot be undone.',confirmLabel:'Delete All',danger:true}).then(function(ok){
      if(!ok)return;
      var chain=Promise.resolve();
      paths.forEach(function(p){chain=chain.then(function(){return api.del(p)})});
      chain.then(function(){
        toast('Deleted '+paths.length+' items','success');
        S.selected.clear();
        updateSelectionBar();
        loadBrowse(S.path);
      }).catch(function(e){toast('Error: '+e.message,'error')});
    });
    return;
  }

  var fn=action==='pin'?api.pin:action==='unpin'?api.unpin:null;
  if(fn){
    var chain=Promise.resolve();
    paths.forEach(function(p){chain=chain.then(function(){return fn(p)})});
    chain.then(function(){
      toast((action==='pin'?'Pinned':'Unpinned')+' '+paths.length+' files','success');
      S.selected.clear();
      updateSelectionBar();
      loadBrowse(S.path);
    }).catch(function(e){toast('Error: '+e.message,'error')});
    return;
  }

  if(action==='download'){
    paths.forEach(function(p){doDownload(p)});
    S.selected.clear();
    updateSelectionBar();
    return;
  }
}

// ─── Event Delegation ───────────────────────────────────────────────────────

document.addEventListener('click',function(e){
  var el=e.target.closest('[data-action]');
  if(!el)return;
  var action=el.getAttribute('data-action');
  var path=el.getAttribute('data-path');
  var page=el.getAttribute('data-page');
  var col=el.getAttribute('data-col');

  switch(action){
    case'goHome':
      e.preventDefault();
      goPage('browse',{path:'/'});
      break;
    case'goPage':
      e.preventDefault();
      goPage(page);
      break;
    case'navigate':
      e.preventDefault();
      goPage('browse',{path:path});
      break;
    case'showInfo':
      e.preventDefault();
      openInfoPanel(path);
      break;
    case'download':
      e.preventDefault();
      doDownload(path);
      break;
    case'pin':
      e.preventDefault();
      doPin(path);
      break;
    case'unpin':
      e.preventDefault();
      doUnpin(path);
      break;
    case'deleteFile':
      e.preventDefault();
      doDelete(path);
      break;
    case'moveFile':
      e.preventDefault();
      doMove(path);
      break;
    case'newFolder':
      e.preventDefault();
      doNewFolder();
      break;
    case'duHere':
      e.preventDefault();
      doDuHere();
      break;
    case'uploadFile':
      e.preventDefault();
      var inp=document.getElementById('upload-input');
      if(inp)inp.click();
      break;
    case'uploadFolder':
      e.preventDefault();
      var finp=document.getElementById('upload-folder-input');
      if(finp)finp.click();
      break;
    case'verifyFile':
      e.preventDefault();
      doVerify(path);
      break;
    case'sort':
      e.preventDefault();
      if(S.sortCol===col)S.sortAsc=!S.sortAsc;
      else{S.sortCol=col;S.sortAsc=true}
      renderPage();
      break;
    case'selectFile':
      // handled below
      break;
    case'selectAll':
      // handled below
      break;
    case'doSearch':
      e.preventDefault();
      doSearch();
      break;
    case'doTree':
      e.preventDefault();
      loadTree();
      break;
    case'closePanel':
      e.preventDefault();
      closeInfoPanel();
      break;
    case'modalClose':
      e.preventDefault();
      closeModal(null);
      break;
    case'modalConfirm':
      e.preventDefault();
      var inp=document.getElementById('modal-input');
      closeModal(inp?inp.value:true);
      break;
    case'bulkPin':
      e.preventDefault();
      doBulkAction('pin');
      break;
    case'bulkUnpin':
      e.preventDefault();
      doBulkAction('unpin');
      break;
    case'bulkDelete':
      e.preventDefault();
      doBulkAction('delete');
      break;
    case'bulkDownload':
      e.preventDefault();
      doBulkAction('download');
      break;
    case'clearSelection':
      e.preventDefault();
      S.selected.clear();
      updateSelectionBar();
      renderPage();
      break;
  }
});

// Checkbox handling (needs change event, not click)
document.addEventListener('change',function(e){
  var el=e.target;
  if(el.matches('[data-action="selectFile"]')){
    var p=el.getAttribute('data-path');
    if(el.checked)S.selected.add(p);else S.selected.delete(p);
    // Update row highlight
    var row=el.closest('tr');
    if(row)row.classList.toggle('selected',el.checked);
    updateSelectionBar();
  }
  if(el.matches('[data-action="selectAll"]')){
    if(!S.listing)return;
    if(el.checked){
      S.listing.files.forEach(function(f){S.selected.add(f.path)});
    } else {
      S.selected.clear();
    }
    updateSelectionBar();
    renderPage();
  }
});

// ─── Keyboard Shortcuts ─────────────────────────────────────────────────────

document.addEventListener('keydown',function(e){
  var tag=document.activeElement?document.activeElement.tagName:'';

  // Modal: Escape always closes, Enter confirms (even from input)
  if(document.getElementById('modal-overlay').classList.contains('open')){
    if(e.key==='Escape'){closeModal(null);e.preventDefault();return}
    if(e.key==='Enter'){var inp=document.getElementById('modal-input');closeModal(inp?inp.value:true);e.preventDefault();return}
    return;
  }

  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return;

  // Info panel escape
  if(document.getElementById('info-panel').classList.contains('open')){
    if(e.key==='Escape'){closeInfoPanel();e.preventDefault();return}
    return;
  }

  // Close keyboard help
  if(e.key==='Escape'&&document.getElementById('kbd-overlay').classList.contains('open')){
    toggleKbdHelp();e.preventDefault();return;
  }

  // Sidebar close on escape
  if(e.key==='Escape'){
    document.getElementById('sidebar').classList.remove('open');
    return;
  }

  // Focus search
  if(e.key==='/'){
    e.preventDefault();
    document.getElementById('global-search').focus();
    return;
  }

  // Keyboard help
  if(e.key==='?'){
    e.preventDefault();
    toggleKbdHelp();
    return;
  }

  // Browse-specific shortcuts
  if(S.page==='browse'&&S.listing){
    var allItems=[];
    (S.listing.dirs||[]).forEach(function(d){allItems.push({name:d,isDir:true,path:pathJoin(S.path,d)})});
    (sortItems(S.listing.dirs,S.listing.files).files||[]).forEach(function(f){allItems.push({name:f.name,isDir:false,path:f.path})});

    if(e.key==='j'||e.key==='ArrowDown'){
      e.preventDefault();
      if(S.focusIdx<allItems.length-1)S.focusIdx++;
      highlightFocus(allItems);
      return;
    }
    if(e.key==='k'||e.key==='ArrowUp'){
      e.preventDefault();
      if(S.focusIdx>0)S.focusIdx--;
      highlightFocus(allItems);
      return;
    }
    if((e.key==='Enter'||e.key==='l'||e.key==='ArrowRight')&&S.focusIdx>=0&&S.focusIdx<allItems.length){
      e.preventDefault();
      var item=allItems[S.focusIdx];
      if(item.isDir)goPage('browse',{path:item.path});
      else openInfoPanel(item.path);
      return;
    }
    if((e.key==='Backspace'||e.key==='h'||e.key==='ArrowLeft')&&S.path!=='/'){
      e.preventDefault();
      goPage('browse',{path:pathParent(S.path)});
      return;
    }
    if(e.key==='~'){
      e.preventDefault();
      goPage('browse',{path:'/'});
      return;
    }
    if(S.focusIdx>=0&&S.focusIdx<allItems.length&&!allItems[S.focusIdx].isDir){
      var fp=allItems[S.focusIdx].path;
      if(e.key==='d'){e.preventDefault();doDownload(fp);return}
      if(e.key==='p'){e.preventDefault();doPin(fp);return}
      if(e.key==='u'){e.preventDefault();doUnpin(fp);return}
      if(e.key==='x'){e.preventDefault();doDelete(fp);return}
      if(e.key==='i'){e.preventDefault();openInfoPanel(fp);return}
    }
    if(e.key===' '&&S.focusIdx>=0&&S.focusIdx<allItems.length){
      e.preventDefault();
      var fp=allItems[S.focusIdx].path;
      if(!allItems[S.focusIdx].isDir){
        if(S.selected.has(fp))S.selected.delete(fp);else S.selected.add(fp);
        updateSelectionBar();
        renderPage();
        highlightFocus(allItems);
      }
      return;
    }
  }
});

// ─── Keyboard Help ──────────────────────────────────────────────────────────

function toggleKbdHelp(){
  var overlay=document.getElementById('kbd-overlay');
  if(overlay.classList.contains('open')){overlay.classList.remove('open');overlay.innerHTML='';return;}
  var html='<div class="kbd-modal"><div class="kbd-modal-header"><h3>Keyboard Shortcuts</h3>'
    +'<button class="btn-icon" id="kbd-close" title="Close">✕</button></div>'
    +'<div class="kbd-modal-body">'
    +'<div class="kbd-section">Global</div>'
    +'<div class="kbd-row"><span>Search</span><span class="kbd-key">/</span></div>'
    +'<div class="kbd-row"><span>Keyboard shortcuts</span><span class="kbd-key">?</span></div>'
    +'<div class="kbd-row"><span>Close panel / sidebar</span><span class="kbd-key">Esc</span></div>'
    +'<div class="kbd-section">File Browser</div>'
    +'<div class="kbd-row"><span>Move down</span><span><span class="kbd-key">j</span> <span class="kbd-key">↓</span></span></div>'
    +'<div class="kbd-row"><span>Move up</span><span><span class="kbd-key">k</span> <span class="kbd-key">↑</span></span></div>'
    +'<div class="kbd-row"><span>Open / Enter</span><span><span class="kbd-key">Enter</span> <span class="kbd-key">l</span> <span class="kbd-key">→</span></span></div>'
    +'<div class="kbd-row"><span>Go up directory</span><span><span class="kbd-key">h</span> <span class="kbd-key">←</span> <span class="kbd-key">Backspace</span></span></div>'
    +'<div class="kbd-row"><span>Go to root</span><span class="kbd-key">~</span></div>'
    +'<div class="kbd-row"><span>Toggle select</span><span class="kbd-key">Space</span></div>'
    +'<div class="kbd-section">File Actions (when focused)</div>'
    +'<div class="kbd-row"><span>Download</span><span class="kbd-key">d</span></div>'
    +'<div class="kbd-row"><span>Pin (keep local)</span><span class="kbd-key">p</span></div>'
    +'<div class="kbd-row"><span>Unpin (evict local)</span><span class="kbd-key">u</span></div>'
    +'<div class="kbd-row"><span>Info panel</span><span class="kbd-key">i</span></div>'
    +'<div class="kbd-row"><span>Delete</span><span class="kbd-key">x</span></div>'
    +'</div></div>';
  overlay.innerHTML=html;
  overlay.classList.add('open');
  document.getElementById('kbd-close').addEventListener('click',function(){toggleKbdHelp()});
  overlay.addEventListener('click',function(ev){if(ev.target===overlay)toggleKbdHelp()});
}

function highlightFocus(allItems){
  document.querySelectorAll('.file-row.focused').forEach(function(r){r.classList.remove('focused')});
  if(S.focusIdx<0||!allItems||S.focusIdx>=allItems.length)return;
  var fp=allItems[S.focusIdx].path;
  var row=document.querySelector('.file-row[data-filepath="'+CSS.escape(fp)+'"]');
  if(row){
    row.classList.add('focused');
    row.scrollIntoView({block:'nearest'});
  }
}

// Enter in modal input
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&document.activeElement&&document.activeElement.id==='modal-input'){
    e.preventDefault();
    closeModal(document.activeElement.value);
  }
});

// ─── Storage Bar (polling) ──────────────────────────────────────────────────

function pollStorage(){
  api.status().then(function(s){
    var used=0,total=0;
    (s.providers||[]).forEach(function(p){
      if(p.quota_total_bytes)total+=p.quota_total_bytes;
      if(p.quota_total_bytes&&p.quota_free_bytes!=null)used+=(p.quota_total_bytes-p.quota_free_bytes);
    });
    var pct=total>0?Math.min(100,used/total*100):0;
    document.getElementById('storage-fill').style.width=pct+'%';
    document.getElementById('storage-label').textContent=total>0?(fmtSize(used)+' / '+fmtSize(total)):'—';
  }).catch(function(){});
}

function pollUploads(){
  api.uploads().then(function(ups){
    S.uploads=ups||[];
    var badge=document.getElementById('upload-badge');
    if(badge){
      if(S.uploads.length){badge.style.display='';badge.textContent=S.uploads.length}
      else{badge.style.display='none'}
    }
    // If on uploads page, refresh
    if(S.page==='uploads'){
      var el=document.getElementById('uploads-list');
      if(el)refreshUploads();
    }
    // If uploads changed and on browse page, refresh listing
    if(S.page==='browse'&&S.uploads.length)loadBrowse(S.path);
  }).catch(function(){});
}

// ─── Upload: file input + drag-drop ─────────────────────────────────────────

document.addEventListener('change',function(e){
  if(e.target.id==='upload-input'){
    doUploadFiles(e.target.files);
    e.target.value='';
  }
  if(e.target.id==='upload-folder-input'){
    var files=e.target.files;
    if(!files||!files.length)return;
    var entries=[];
    for(var i=0;i<files.length;i++){
      var f=files[i];
      var rel=f.webkitRelativePath||f.name;
      var parts=rel.split('/');
      // relDir = all path components except the filename
      var relDir=parts.slice(0,parts.length-1).join('/');
      entries.push({file:f,relDir:relDir});
    }
    doUploadWithPaths(entries);
    e.target.value='';
  }
});

(function(){
  var main=document.getElementById('main');
  var dragCounter=0;
  main.addEventListener('dragenter',function(e){e.preventDefault();dragCounter++;main.classList.add('drag-over')});
  main.addEventListener('dragleave',function(e){e.preventDefault();dragCounter--;if(dragCounter<=0){dragCounter=0;main.classList.remove('drag-over')}});
  main.addEventListener('dragover',function(e){e.preventDefault()});
  main.addEventListener('drop',function(e){
    e.preventDefault();dragCounter=0;main.classList.remove('drag-over');
    if(S.page!=='browse'||!e.dataTransfer)return;
    // Collect all entries in a single pass (webkitGetAsEntry is only valid synchronously during drop).
    var items=e.dataTransfer.items;
    var entries=[];
    var hasDir=false;
    if(items){
      for(var i=0;i<items.length;i++){
        var entry=items[i].webkitGetAsEntry&&items[i].webkitGetAsEntry();
        if(entry){
          entries.push(entry);
          if(entry.isDirectory)hasDir=true;
        }
      }
    }
    if(hasDir&&entries.length){
      var results=[];var pending=entries.length;
      entries.forEach(function(entry){
        readEntryRecursive(entry,'',results,function(){pending--;if(!pending)doUploadWithPaths(results);});
      });
    } else if(e.dataTransfer.files.length){
      doUploadFiles(e.dataTransfer.files);
    }
  });
})();

// ─── Init ───────────────────────────────────────────────────────────────────

goPage('browse',{path:'/'});
pollStorage();
setInterval(pollStorage,15000);
setInterval(pollUploads,3000);

})();
