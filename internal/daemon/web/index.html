<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>pdrive</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💾</text></svg>">
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<div class="app" id="app">
  <header class="topbar">
    <button class="hamburger" id="hamburger" title="Toggle sidebar">☰</button>
    <span class="logo" data-action="goHome">pdrive</span>
    <div class="search-global">
      <span class="search-icon">⌕</span>
      <input type="text" id="global-search" placeholder="Search files… ( / )" autocomplete="off">
    </div>
    <div class="storage-wrap">
      <div class="storage-track"><div class="storage-fill" id="storage-fill"></div></div>
      <span id="storage-label">—</span>
    </div>
  </header>

  <nav class="sidebar" id="sidebar">
    <div class="sidebar-section">Navigation</div>
    <a class="nav-item active" data-action="goPage" data-page="browse"><span class="nav-icon">📂</span>Files</a>
    <a class="nav-item" data-action="goPage" data-page="dashboard"><span class="nav-icon">📊</span>Dashboard</a>
    <a class="nav-item" data-action="goPage" data-page="uploads"><span class="nav-icon">📤</span>Uploads<span class="nav-badge" id="upload-badge" style="display:none">0</span></a>
    <a class="nav-item" data-action="goPage" data-page="search"><span class="nav-icon">🔍</span>Search</a>
    <a class="nav-item" data-action="goPage" data-page="tree"><span class="nav-icon">🌳</span>Tree</a>
    <div class="sidebar-section">System</div>
    <a class="nav-item" data-action="goPage" data-page="activity"><span class="nav-icon">📋</span>Activity</a>
    <a class="nav-item" data-action="goPage" data-page="metrics"><span class="nav-icon">📈</span>Metrics</a>
  </nav>

  <main class="main" id="main">
    <div class="drop-overlay"><div class="drop-overlay-icon">📂</div><div class="drop-overlay-text">Drop files or folders here to upload</div></div>
  </main>
</div>

<div class="panel-overlay" id="panel-overlay"></div>
<div class="info-panel" id="info-panel"></div>
<div class="modal-overlay" id="modal-overlay"></div>
<div class="selection-bar" id="selection-bar"></div>
<div class="toast-container" id="toasts"></div>
<div class="upload-drawer" id="upload-drawer"></div>
<div class="kbd-overlay" id="kbd-overlay"></div>

<script src="/static/app.js"></script>
</body>
</html>
